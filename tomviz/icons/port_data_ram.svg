<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="24" height="24" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <!-- RAM stick: PCB body with two chip cutouts on top, and three
       connector pins hanging below where the pin thickness matches
       the gap between them. -->
  <path fill="#000" fill-rule="evenodd" d="
    M 2 6 H 22 V 16 H 2 Z
    M 4 8 H 11 V 14 H 4 Z
    M 13 8 H 20 V 14 H 13 Z"/>
  <g fill="#000">
    <rect x="3.25" y="16" width="3.5" height="3"/>
    <rect x="10.25" y="16" width="3.5" height="3"/>
    <rect x="17.25" y="16" width="3.5" height="3"/>
  </g>
</svg>
